<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - Gerência e Gestão Patrimonial</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/94/94859.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <header class="header">
                <h1>Simulado de Enfermagem</h1>
                <p>Gerência e Gestão Patrimonial</p>
            </header>
            
            <main class="container">
                <div class="welcome-section">
                    <img src="https://media1.tenor.com/m/8a3Opn3C07cAAAAC/pokemon-nurse.gif" alt="Hospital" class="welcome-gif">
                    <p class="intro-text">Bem-vindo ao simulado de Gerência em Enfermagem e Gestão Patrimonial!</p>
                </div>
                
                <div class="menu-options">
                    <button class="btn btn-primary" onclick="showScreen('content-screen', 'gerencia')">
                        Conteúdo: Gerência
                    </button>
                    <button class="btn btn-primary" onclick="showScreen('content-screen', 'patrimonial')">
                        Conteúdo: Gestão Patrimonial
                    </button>
                    <button class="btn btn-success" onclick="showScreen('quiz-select-screen')">
                        Iniciar Simulado
                    </button>
                    <button class="btn btn-info" onclick="showScreen('history-screen')">
                        Ver Histórico de Tentativas
                    </button>
                </div>
            </main>
        </div>

        <!-- Quiz Selection Screen -->
        <div id="quiz-select-screen" class="screen">
            <header class="header-internal">
                <button class="btn-back" onclick="backToHome()">Voltar</button>
                <h1>Escolha a Matéria</h1>
            </header>
            
            <main class="container">
                <div class="selection-content">
                    <p class="selection-intro">Selecione qual matéria deseja ser avaliado:</p>
                    <div class="selection-options">
                        <button class="btn btn-selection" onclick="startQuizByCategory('Gerência')">
                            <span class="selection-title">Gerência em Enfermagem</span>
                            <span class="selection-subtitle">20 questões</span>
                        </button>
                        <button class="btn btn-selection" onclick="startQuizByCategory('Gestão Patrimonial')">
                            <span class="selection-title">Gestão Patrimonial</span>
                            <span class="selection-subtitle">20 questões</span>
                        </button>
                        <button class="btn btn-selection-full" onclick="startQuizByCategory('Ambas')">
                            <span class="selection-title">Simulado Completo</span>
                            <span class="selection-subtitle">40 questões (20 de cada matéria)</span>
                        </button>
                    </div>
                </div>
            </main>
        </div>

        <!-- Content Screen (Estudo) -->
        <div id="content-screen" class="screen">
            <header class="header-internal">
                <button class="btn-back" onclick="backToHome()">Voltar</button>
                <h1 id="content-title">Conteúdo</h1>
            </header>
            
            <main class="container">
                <div id="content-body" class="content-body"></div>
            </main>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <header class="header-internal quiz-header">
                <button class="btn-back" onclick="exitQuiz()">Voltar</button>
                <div class="quiz-progress">
                    <span id="quiz-counter">Questão 1 de 40</span>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </header>
            
            <main class="container quiz-container">
                <div id="quiz-content" class="quiz-content"></div>
                <div id="feedback-area" class="feedback-area hidden"></div>
            </main>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <header class="header-internal">
                <h1>Resultado do Simulado</h1>
            </header>
            
            <main class="container results-container">
                <div class="results-summary">
                    <div class="score-display">
                        <h2 id="final-score">0/40</h2>
                        <p id="score-percentage">0%</p>
                    </div>
                    <div id="results-stats" class="results-stats"></div>
                </div>
                
                <div class="chart-container">
                    <h3>Comparação de Tentativas</h3>
                    <canvas id="attempts-chart" class="chart-canvas"></canvas>
                </div>
                
                <div class="results-actions">
                    <button class="btn btn-success" onclick="backToHome()">Escolher Outra Matéria</button>
                    <button class="btn btn-primary" onclick="backToHome()">Voltar ao Início</button>
                </div>
            </main>
        </div>

        <!-- History Screen -->
        <div id="history-screen" class="screen">
            <header class="header-internal">
                <button class="btn-back" onclick="backToHome()">Voltar</button>
                <h1>Histórico de Tentativas</h1>
            </header>
            
            <main class="container">
                <div id="history-content" class="history-content"></div>
            </main>
        </div>
    </div>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="quiz-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
